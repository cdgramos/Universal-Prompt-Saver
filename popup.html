<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Manage Prompts</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="header">
        <h1>Saved Prompts</h1>
        <button id="toggleSettings">⚙️ Settings</button>
    </div>

    <!-- Settings Section (Initially Hidden) -->
    <div id="settingsSection" class="hidden">
        <h2>Settings</h2>
        <div class="settings-form">
            <div class="form-group">
                <label>OpenAI API Key</label>
                <div class="input-with-action">
                    <input type="password" id="openaiKey" placeholder="sk-...">
                    <button id="clearOpenAI">Clear</button>
                </div>
            </div>
            <div class="form-group">
                <label>Gemini API Key</label>
                <div class="input-with-action">
                    <input type="password" id="geminiKey" placeholder="AIza...">
                    <button id="clearGemini">Clear</button>
                </div>
            </div>
            <div class="form-group">
                <label>Default Provider</label>
                <select id="defaultProvider">
                    <option value="openai">OpenAI</option>
                    <option value="gemini">Google Gemini</option>
                </select>
            </div>
            <div class="form-group">
                <label>Default OpenAI Model</label>
                <input type="text" id="defaultOpenAIModel" placeholder="gpt-3.5-turbo">
            </div>
             <div class="form-group">
                <label>Default Gemini Model</label>
                <input type="text" id="defaultGeminiModel" placeholder="gemini-1.5-flash">
            </div>
            <button id="saveSettings" class="primary-btn">Save Settings</button>
            <button id="closeSettings">Close</button>
        </div>
        <hr>
    </div>

    <!-- Main Prompt Editor -->
    <div id="mainSection">
        <div class="form">
          <input type="text" id="newTitle" placeholder="Title">
          <input type="text" id="newFolder" placeholder="Folder (e.g., Support)" list="folderSuggestions">
          <datalist id="folderSuggestions"></datalist>

          <div class="type-toggle">
              <label>Type:</label>
              <label><input type="radio" name="promptType" value="paste" checked> Paste</label>
              <label><input type="radio" name="promptType" value="llm"> LLM</label>
          </div>

          <!-- Paste Prompt UI -->
          <div id="pasteFields">
              <textarea id="newPrompt" placeholder="Enter your prompt. Tokens: {{date}} {{time}} {{datetime}} {{iso}} {{weekday}}"></textarea>
          </div>

          <!-- LLM Prompt UI -->
          <div id="llmFields" class="hidden">
              <div class="llm-config-row">
                  <select id="llmProvider">
                      <option value="openai">OpenAI</option>
                      <option value="gemini">Gemini</option>
                  </select>
                  <input type="text" id="llmModel" placeholder="Model (optional)">
              </div>
              <textarea id="llmSystem" placeholder="System Instruction (optional)"></textarea>
              <textarea id="llmUser" placeholder="User Message Template. Use {{selection}} for selected text."></textarea>
              <div class="llm-config-row">
                  <input type="number" id="llmTemp" placeholder="Temp (0.7)" step="0.1" min="0" max="2">
                  <input type="number" id="llmMaxTokens" placeholder="Max Tokens">
              </div>
          </div>

          <button id="savePrompt">Save Prompt</button>
          <button id="cancelEdit" class="hidden">Cancel</button>
        </div>

        <div id="groupedList"></div>

        <hr>
        <div class="prompt-actions">
          <div class="export-section">
            <button id="exportPrompts">Export Prompts</button>
          </div>
          <div class="import-section">
            <button id="importPrompts">Import Prompts</button>
            <input type="file" id="importFile" accept=".json">
          </div>
        </div>
    </div>

    <div id="appVersion"></div>
    <script src="popup.js"></script>
  </body>
</html>
